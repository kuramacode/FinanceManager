<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledger — Transactions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>

  <aside>
    <div class="sidebar-logo">
      <div class="logo-mark">𝐋</div>
      <span class="logo-name">Ledger</span>
    </div>

    <nav>
      <div class="nav-label">Menu</div>
      <a href="{{ url_for('dashboard') }}">
        <svg viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity=".5"/><rect x="8.5" y="1" width="5.5" height="5.5" rx="1.2" fill="currentColor"/><rect x="1" y="8.5" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity=".5"/><rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity=".5"/></svg>
        Dashboard
      </a>
      <a href="{{ url_for('transactions') }}" class="active">
        <svg viewBox="0 0 15 15" fill="none"><path d="M1.5 4h12M1.5 7.5h9M1.5 11h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Transactions
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user">
        <div class="user-avatar">AL</div>
        <div>
          <div class="user-name">Alex Lane</div>
          <div class="user-role">Personal</div>
        </div>
      </div>
    </div>
  </aside>

  <main>
    <h1 class="page-title"><em>All</em> transactions</h1>
    <p class="page-sub" id="pageDate"></p>

    <ul class="tx-list" id="txList"></ul>
  </main>

  <script src="{{ url_for('static', filename='scripts/data.js') }}"></script>
  <script>
    const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
    const list = document.getElementById('txList');

    list.innerHTML = sorted.map((t, i) => `
      <li class="tx-item" style="animation-delay:${i * 35}ms">
        <div class="tx-icon">${ICONS[t.cat] || '📦'}</div>
        <div class="tx-body">
          <div class="tx-name">${t.desc}</div>
          <div class="tx-meta">
            <span class="tx-date">${fmtDate(t.date)}</span>
            <span class="tx-cat">${t.cat}</span>
          </div>
        </div>
        <div class="tx-amount ${t.type === 'income' ? 'pos' : 'neg'}">
          ${t.type === 'income' ? '+' : '−'}${fmt(t.amount)}
        </div>
      </li>
    `).join('');

    document.getElementById('pageDate').textContent =
      new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  </script>
</body>
</html>
