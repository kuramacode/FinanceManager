<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger — Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Left panel -->
  <div class="panel-left">
    <a href="index.html" class="logo">
      <span class="logo-icon">L</span>
      <span class="logo-text">Ledger</span>
    </a>
    <div class="panel-body">
      <p class="panel-eyebrow">Welcome back</p>
      <h1 class="panel-title">Sign in<br /><em>to your account</em></h1>
      <p class="panel-desc">
        Continue tracking your finances right where you left off.
      </p>
    </div>
    <div class="panel-quote">
      <blockquote>"Knowing where your money goes is the first step to having more of it."</blockquote>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel-right">
    <div class="form-wrap">
      <p class="form-eyebrow">Sign in</p>
      <h2 class="form-title">Welcome back</h2>
        <a href="{{ url_for('register.register') }}" style="color: #1a1a1a; text-decoration: none; font-style: italic;">Don't have an account? Register!</a>

      <form class="form" action="{{ url_for('auth.login') }}" method="post">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" name="username" placeholder="Username" required></input>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" name="password" placeholder="Password" required />
            <button type="button" class="toggle-pass" id="togglePass" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="field-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit">
          <span class="btn-text">Sign in</span>
          <span class="btn-spinner" id="spinner" hidden>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" stroke-opacity=".25"/>
              <path d="M12 2a10 10 0 0 1 10 10" class="spin"/>
            </svg>
          </span>
        </button>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
