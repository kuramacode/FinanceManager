<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledger — Categories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>
  <main>
    <div class="page-header">
      <div>
        <h1 class="page-title">Cate<em>gories</em></h1>
        <p class="page-sub" id="pageDate"></p>
      </div>
      <button class="btn-add" onclick="openModal()">
        <svg viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New Category
      </button>
    </div>


    <div class="stat-cards">
      <div class="card green">
        <div class="card-label">Income categories</div>
        <div class="card-value" id="countIncome">0</div>
        <div class="card-sub">earning types</div>
      </div>
      <div class="card red">
        <div class="card-label">Expense categories</div>
        <div class="card-value" id="countExpense">0</div>
        <div class="card-sub">spending types</div>
      </div>
      <div class="card neutral">
        <div class="card-label">Total categories</div>
        <div class="card-value" id="countTotal">0</div>
        <div class="card-sub">across all types</div>
      </div>
    </div>

    <div class="cat-section">
      <div class="list-header" style="margin-bottom: 14px;">
        <span class="section-title">Income</span>
        <div class="search-wrap">
          <svg viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input type="text" id="searchInput" placeholder="Search categories…" oninput="renderAll()">
        </div>
      </div>
      <div class="cat-grid" id="incomeGrid"></div>
      <div class="empty-state" id="emptyIncome">
        <svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="14" stroke="currentColor" stroke-width="1.4"/><path d="M18 11v7l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <p>No income categories yet</p>
      </div>
    </div>

    <div class="cat-section" style="margin-top: 36px;">
      <div class="list-header" style="margin-bottom: 14px;">
        <span class="section-title">Expense</span>
      </div>
      <div class="cat-grid" id="expenseGrid"></div>
      <div class="empty-state" id="emptyExpense">
        <svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="14" stroke="currentColor" stroke-width="1.4"/><path d="M18 11v7l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <p>No expense categories yet</p>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">New <em>Category</em></div>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <p class="modal-sub">Define a label, icon and type</p>

      <div class="field">
        <label>Category Name</label>
        <input type="text" id="f_name" placeholder="e.g. Dining Out, Side Income…">
      </div>

      <div class="field">
        <label>Icon <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted);font-size:0.65rem;">(pick one)</span></label>
        <div class="emoji-picker" id="emojiPicker"></div>
        <input type="hidden" id="f_icon">
      </div>

      <div class="field-row">
        <div class="field">
          <label>Type</label>
          <select id="f_type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div class="field">
          <label>Colour</label>
          <div class="color-swatches" id="colorSwatches"></div>
          <input type="hidden" id="f_color">
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-submit" id="submitBtn" onclick="submitCategory()">Add Category</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="deleteOverlay" onclick="handleDeleteOverlayClick(event)">
    <div class="modal" style="max-width:360px;">
      <div class="modal-header">
        <div class="modal-title">Delete <em>Category</em></div>
        <button class="modal-close" onclick="closeDeleteModal()">
          <svg viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <p class="modal-sub" id="deleteMsg">Are you sure?</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-delete" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <script src="addButton.js"></script>
</body>
</html>
