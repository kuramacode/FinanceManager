<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
    {% endblock %}
</head>
<body>
  <aside>
    <div class="sidebar-logo">
      <div class="logo-mark">𝐋</div>
      <span class="logo-name">Ledger</span>
    </div>

    <nav>
      <div class="nav-label">Menu</div>
      <a href="{{ url_for('dashboard.dashboard') }}" class="{% if active_page == 'dashboard' %}active{% endif %}">
        <svg viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity=".5"/><rect x="8.5" y="1" width="5.5" height="5.5" rx="1.2" fill="currentColor"/><rect x="1" y="8.5" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity=".5"/><rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity=".5"/></svg>
        Dashboard
      </a>
      <a href="{{ url_for('transactions.transactions') }}" class="{% if active_page == 'transactions' %}active{% endif %}">
        <svg viewBox="0 0 15 15" fill="none"><path d="M1.5 4h12M1.5 7.5h9M1.5 11h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Transactions
      </a>
      <a href="#">
        <svg viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 4.5v3l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        History
      </a>

      <div class="nav-label">Money</div>
      <a href="{{ url_for('accounts.accounts') }}" class="{% if active_page == 'accounts' %}active{% endif %}">
        <svg viewBox="0 0 15 15" fill="none"><rect x="1" y="3" width="13" height="9" rx="1.8" stroke="currentColor" stroke-width="1.4"/><path d="M1 6h13" stroke="currentColor" stroke-width="1.4"/></svg>
        Accounts
      </a>
      <a href="{{ url_for('budgets.budgets') }}" class="{% if active_page == 'budgets' %}active{% endif %}">
        <svg viewBox="0 0 15 15" fill="none"><path d="M2 12L7.5 3 13 12H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        Budgets
      </a>
      <a href="#">
        <svg viewBox="0 0 15 15" fill="none"><path d="M1.5 10.5L5.5 6.5l3 3 5-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Analytics
      </a>

      <div class="nav-label">Manage</div>
      <a href="{{ url_for('category.category') }}" class="{% if active_page == 'categories' %}active{% endif %}">
        <svg viewBox="0 0 15 15" fill="none"><circle cx="4.5" cy="4.5" r="3" stroke="currentColor" stroke-width="1.4"/><circle cx="10.5" cy="10.5" r="3" stroke="currentColor" stroke-width="1.4"/><circle cx="10.5" cy="4.5" r="3" stroke="currentColor" stroke-width="1.4" opacity=".45"/><circle cx="4.5" cy="10.5" r="3" stroke="currentColor" stroke-width="1.4" opacity=".45"/></svg>
        Categories
      </a>
      <a href="{{ url_for('currency.currency') }}" class="{% if active_page == 'currency' %}active{% endif %}">
        <svg viewBox="0 0 15 15" fill="none"><path d="M2 5h11M10 2l3 3-3 3M13 10H2M5 7l-3 3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Exchange
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user">
        <div class="user-avatar">AL</div>
        <div>
          <div class="user-name">{{ username }}</div>
          <div class="user-role">Personal</div>
        </div>
      </div>
    </div>
  </aside>

  {% block body %}
  {% endblock %}
</body>
</html>
