<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
    <title>Register</title>
</head>

<body>
    <div class="adding-form">
        <form action="{{ url_for('register.register') }}" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="index@gmail.com" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="password_repeat" placeholder="Please repeat the password" required>
            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
